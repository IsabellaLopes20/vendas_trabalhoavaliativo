{% extends "base_template.html"%}

{% block title%}
    <title> Pé Confortável Ltda - Cadastro de Fabricantes </title>
{% endblock %}


{% block menu %}
    <div class="collapse navbar-collapse justify-content-end" id="mynavbar">
        <div class="navbar-nav">
            <a href="{% url 'index' %}" class="nav-link">Início</a>
            <a href="{% url 'fabricantes:cadastro'%}" class="nav-link">Cadastrar</a>
            <a href="{% url 'fabricantes:listar'%}" class="nav-link">Listar</a>
        </div>
    </div>
{% endblock %}

{% block titulo_pagina %}
{% endblock %}

{% block main %}
<div class="container">
    <form name="idFrmCadastrarFabricantes" action="{% url 'fabricantes:cadastro' %}" method="post">
    {% csrf_token %}
        <div class="form-group">
            <label for="idNomeFabricantes" class="col-form-label">Nome do Fabricante</label>
            <input class="form-control bg-dark text-light" type="text" id="idNomeFabricantes" name="nome"
                placeholder="Informe o nome do fabricante" maxlength="70" required>
        </div>

        <div class="form-group my-4 text-center">
            <input type="reset" value="Limpar" class="btn btn-primary btn-md">
            <input type="submit" value="Cadastrar" class="btn btn-primary btn-md">
        </div>
    </form>
</div>
{% endblock %}
