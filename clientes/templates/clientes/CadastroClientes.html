{% extends "base_template.html"%}

{% block title%}
    <title> Pé Confortável Ltda - Clientes </title>
{% endblock %}


{% block menu %}
    <div class="collapse navbar-collapse justify-content-end" id="mynavbar">
        <div class="navbar-nav">
            <a href="{% url 'index' %}" class="nav-link">Início</a>
            <a href="{% url 'clientes:cadastro'%}" class="nav-link">Cadastrar</a>
            <a href="{% url 'clientes:listar'%}" class="nav-link">Listar</a>
        </div>
    </div>
{% endblock %}

{% block titulo_pagina %}
{% endblock %}

{% block corpo %}
<div class="container">
    <form name="idFrmCadastrarClientes" action="{% url 'clientes:cadastro'%}" method="post">
    {% csrf_token %}
        <div class="form-group">
            <label for="idNomeClientes" class="col-form-label">Nome do Cliente</label>
            <input class="form-control bg-light text-dark" type="text" id="idNomeClientes" name="nome"
                placeholder="Informe o nome do Cliente" maxlength="70" required>
        </div>

        <div class="form-group my-4 text-center">
            <input type="reset" value="Limpar" class="btn btn-primary btn-md">
            <input type="submit" value="Cadastrar" class="btn btn-primary btn-md">
        </div>
    </form>
</div>
{% endblock %}

{% block footer %}
{% endblock %}
